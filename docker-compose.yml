version: "3.9"

services:
  guardian:
    build:
      context: ./guardian
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./guardian/.env
    depends_on:
      - postgres
      - redis

  sentry:
    build:
      context: ./sentry
      dockerfile: Dockerfile
    environment:
      VAULTRELAY_TENANT_ID: ${TENANT_ID}
      VAULTRELAY_SECRET: ${SECRET}
      DB_DSN: ${DB_DSN}
      GUARDIAN_URL: ws://guardian:8000/ws
    depends_on:
      - guardian
    network_mode: host

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vaultrelay
      POSTGRES_PASSWORD: vaultrelay
      POSTGRES_DB: vaultrelay
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
