name: Sentry CI

on:
  push:
    paths:
      - 'sentry/**'
  pull_request:
    paths:
      - 'sentry/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        working-directory: sentry
        run: go mod download

      - name: Lint
        working-directory: sentry
        run: go vet ./...

      - name: Run tests
        working-directory: sentry
        run: go test ./... -v
